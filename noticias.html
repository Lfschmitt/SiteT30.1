<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T30.1 — Notícias</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main>

    <div class="page-header">
      <h1>Notícias</h1>
      <p>Informações e acontecimentos da T30.1</p>
    </div>

    <section>
      <div class="section-container">
        <div class="noticias-layout">

          <!-- Coluna principal: Notícias (~70%) -->
          <div class="noticias-col-main">
            <div class="painel-card">
              <div class="painel-card-title">
                <h2>Notícias</h2>
                <div class="section-divider"></div>
              </div>
              <div id="noticias-container">
                <div class="noticias-loading">Carregando notícias...</div>
              </div>
            </div>
          </div>

          <!-- Coluna lateral: Avisos (~30%) -->
          <div class="noticias-col-side">
            <div class="painel-card painel-card--avisos">
              <div class="painel-card-title">
                <h2>Avisos</h2>
                <div class="section-divider"></div>
              </div>
              <div id="avisos-container">
                <div class="noticias-loading">Carregando avisos...</div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="js/main.js"></script>
  <script src="js/noticias.js"></script>

</body>
</html>
